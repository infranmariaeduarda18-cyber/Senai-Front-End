<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Formulário</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>
<body class="container mt-5">

<h2>Cadastro</h2>

<form>

  <input type="text" id="nome" placeholder="Nome" class="form-control mb-2" required>

  <input type="text" id="cpf" placeholder="CPF" class="form-control mb-2" required>

  <input type="text" id="cep" placeholder="CEP" class="form-control mb-2" required>

  <input type="text" id="endereco" placeholder="Endereço" class="form-control mb-2" required>

  <input type="text" placeholder="Número" class="form-control mb-2" required>

  <input type="text" placeholder="Complemento" class="form-control mb-2">

  <input type="text" id="bairro" placeholder="Bairro" class="form-control mb-2" required>

  <input type="text" id="cidade" placeholder="Cidade" class="form-control mb-2" required>

  <input type="text" id="estado" placeholder="Estado" class="form-control mb-2" required>

  <button class="btn btn-primary">Enviar</button>

</form>
